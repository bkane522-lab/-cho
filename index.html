<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<title>Écho</title>
<meta name="theme-color" content="#E8734A">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/style.css">
</head>
<body>
<div class="container">
  <div class="header">
    <svg class="logo" viewBox="0 0 40 40" fill="none">
      <path d="M4 20 Q10 8, 16 20 T28 20" stroke="#E8734A" stroke-width="2.5" fill="none" stroke-linecap="round"/>
      <circle cx="30" cy="20" r="8" fill="#1A2B3D"/>
      <path d="M26 20l3 3 6-6" stroke="#FAF7F2" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <div>
      <h1>Écho</h1>
      <div class="tagline">Parle. L'IA écoute pour toi.</div>
    </div>
  </div>

  <div class="disclaimer">
    L'IA peut se tromper — vérifiez toujours les résultats avant de les envoyer.
  </div>

  <div class="btn-row">
    <button class="btn btn-primary" onclick="location.href='/record.html?mode=live'">
      <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2M12 19v4"/></svg>
      Enregistrer
    </button>
  </div>
  <div class="btn-row">
    <button class="btn btn-secondary" onclick="document.getElementById('fileInput').click()">
      <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="#1A2B3D" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12"/></svg>
      Importer un fichier audio
    </button>
    <input type="file" id="fileInput" accept="audio/*">
  </div>
  <div class="btn-row">
    <button class="btn btn-secondary" onclick="location.href='/history.html'">
      <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="#1A2B3D" stroke-width="2"><path d="M3 3v5h5M3.05 13A9 9 0 1 0 6 5.3L3 8"/><path d="M12 7v5l4 2"/></svg>
      Historique
    </button>
  </div>

  <h2 style="font-size: 16px; margin: 24px 0 12px;">Sessions récentes</h2>
  <div class="card" id="recentSessions"></div>
</div>

<script src="/app.js"></script>
<script>
  const sessions = Echo.getSessions().slice(0, 5);
  const container = document.getElementById('recentSessions');

  if (sessions.length === 0) {
    container.innerHTML = `
      <div class="empty-state">
        <svg viewBox="0 0 24 24" fill="none" stroke="#4A5A6D" stroke-width="1.5"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2M12 19v4"/></svg>
        <div>Aucune session pour l'instant.<br>Lance ton premier enregistrement.</div>
      </div>`;
  } else {
    container.innerHTML = sessions.map(s => `
      <div class="session-item" onclick="location.href='/review.html?id=${s.id}'">
        <div>
          <div class="session-title">${Echo.escapeHtml(s.title || 'Session sans titre')}</div>
          <div class="session-date">${Echo.formatDate(s.date)}</div>
        </div>
        <div class="session-counts">
          <span class="badge">${(s.tasks || []).length} tâches</span>
        </div>
      </div>
    `).join('');
  }

  document.getElementById('fileInput').addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      sessionStorage.setItem('echo_import_data', reader.result);
      sessionStorage.setItem('echo_import_name', file.name);
      sessionStorage.setItem('echo_import_size', String(file.size));
      location.href = '/record.html?mode=import';
    };
    reader.readAsDataURL(file);
  });
</script>
</body>
</html>
