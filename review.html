<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<title>Écho — Résultat</title>
<meta name="theme-color" content="#E8734A">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/style.css">
</head>
<body>
<div class="container">
  <button class="back-btn" onclick="location.href='/index.html'">← Accueil</button>
  <h1 id="sessionTitle" contenteditable="true" style="font-size:20px; margin-bottom:4px;"></h1>
  <div class="session-date" id="sessionDate" style="margin-bottom:20px;"></div>

  <div class="disclaimer">Vérifiez les résultats avant de les envoyer — l'IA peut se tromper.</div>

  <div class="card">
    <div style="font-weight:600; margin-bottom:8px;">Résumé</div>
    <div class="summary-box" id="summaryText" contenteditable="true"></div>
  </div>

  <div class="tabs">
    <button class="tab active" data-tab="tasks">✓ Tâches</button>
    <button class="tab" data-tab="decisions">🤝 Décisions</button>
    <button class="tab" data-tab="deadlines">📅 Échéances</button>
  </div>

  <div class="card">
    <div id="tabContent"></div>
    <div class="add-item-row">
      <input type="text" class="add-item-input" id="addItemInput" placeholder="Ajouter manuellement…">
      <button class="add-item-btn" id="addItemBtn">+</button>
    </div>
  </div>

  <div class="btn-row">
    <button class="btn btn-primary" id="saveBtn">Sauvegarder dans l'historique</button>
  </div>
  <div class="btn-row">
    <button class="btn btn-secondary" id="exportBtn">Exporter</button>
    <button class="btn btn-secondary" id="shareBtn">Partager</button>
  </div>
  <div class="btn-row">
    <button class="btn btn-secondary" onclick="location.href='/record.html?mode=live'">Nouvelle réunion</button>
  </div>
  <div class="btn-row" id="deleteRow" style="display:none;">
    <button class="btn btn-secondary btn-danger" id="deleteBtn">Supprimer cette session</button>
  </div>
</div>

<script src="/app.js"></script>
<script src="/review.js"></script>
</body>
</html>
